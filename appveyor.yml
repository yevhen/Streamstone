skip_tags: true

version: 2.0.{build}

image: Ubuntu2204

init:
    - git config --global core.autocrlf input

install:
  - sudo apt-get update && sudo apt-get install -y dotnet-sdk-10.0
  - npm install -g azurite
  
build_script:
    - (exec azurite -l ~/.data &)
    - sleep 5
    - dotnet tool restore
    - dotnet nake pack

artifacts:
- path: Artifacts\Release\*.nupkg
